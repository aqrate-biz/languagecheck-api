site_name: LanguageCheck developer portal
site_author: LanguageCheck.ai
site_description: Documentation for using the LanguageCheck API
site_url: https://aqrate-biz.github.io/languagecheck-api/

theme:
  name: material # tema Material Design
  logo: assets/logo.webp
  favicon: assets/favicon.ico
  palette:
    # Modalità chiara
    - scheme: default
      primary: indigo # colore principale
      accent: indigo
  font:
    text: Inter
    code: Google Sans Code
  features:
    - navigation.sections # sezioni nel menu laterale
    - navigation.top # pulsante "torna su"
    - navigation.instant # navigazione istantanea senza ricaricare
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - search.highlight # evidenzia risultati ricerca
    - search.suggest # suggerimenti durante la digitazione
    - content.code.copy # pulsante copia sui blocchi codice

plugins:
  - search # ricerca integrata
  - swagger-ui-tag:
      # Opzioni supportate dal plugin (compatibili con --strict)
      background: "#f5f7fb"
      docExpansion: none
      syntaxHighlightTheme: monokai
      tryItOutEnabled: true
      filter: true
      dark_scheme_name: slate
      validatorUrl: none

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Authentication: authentication.md
  - API Reference: api-reference.md

markdown_extensions:
  - admonition # box note/warning/tip
  - pymdownx.highlight: # syntax highlighting
      anchor_linenums: true
  - pymdownx.superfences # blocchi codice annidati
  - pymdownx.tabbed: # tab nei contenuti
      alternate_style: true
  - attr_list
  - md_in_html
